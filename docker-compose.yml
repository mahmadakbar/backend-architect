version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: task-management-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-testtodo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-todo_postgres}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - task-management-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-testtodo} -d ${DB_NAME:-todo_postgres}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger for OpenTelemetry traces
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: task-management-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP receiver
      - "14250:14250" # Jaeger gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - task-management-network
    profiles:
      - monitoring

  # Redis for Queue Management
  redis:
    image: redis:7-alpine
    container_name: task-management-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - task-management-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-management-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3131}:3131"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3131
      DATABASE_URL: postgresql://${DB_USER:-testtodo}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-todo_postgres}?schema=public
      BASE_URL: ${BACKEND_BASE_URL:-http://localhost:3131}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-60m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      KEY_SECRET: ${KEY_SECRET}
      BRANCH: ${BRANCH:-production}
      # OpenTelemetry Configuration
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      TELEMETRY_SERVICE_NAME: ${TELEMETRY_SERVICE_NAME:-ecommerce-backend}
      TELEMETRY_SERVICE_VERSION: ${TELEMETRY_SERVICE_VERSION:-1.0.0}
      TELEMETRY_OTLP_ENDPOINT: ${TELEMETRY_OTLP_ENDPOINT:-http://jaeger:4318}
      # Redis Configuration
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - task-management-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3131"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        bunx prisma migrate deploy --schema=./src/prisma/schema.prisma &&
        echo 'Starting backend application...' &&
        bun run src/app.ts
      "

  # Frontend Next.js Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-management-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3131/api}
      NEXT_PUBLIC_KEY_SECRET: ${NEXT_PUBLIC_KEY_SECRET}
      # Internal API URL for server-side calls within Docker network
      INTERNAL_API_URL: http://backend:3131/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - task-management-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Optional: Prisma Studio (for database management)
  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-management-prisma-studio
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-testtodo}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-todo_postgres}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - task-management-network
    command: bunx prisma studio --schema=./src/prisma/schema.prisma --port 5555 --browser none
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  task-management-network:
    driver: bridge
