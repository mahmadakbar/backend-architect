name: Deploy with Tests

on:
  push:
    branches: [main, production]
  workflow_dispatch: # Manual deployment trigger

jobs:
  test:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=./src/prisma/schema.prisma

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=./src/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          JWT_ACCESS_SECRET: test-jwt-access-secret-key-for-ci-cd
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-key-for-ci-cd
          JWT_ACCESS_EXPIRES: 60m
          JWT_REFRESH_EXPIRES: 7d
          KEY_SECRET: test-encryption-key-secret
          APIKEY: test-api-key-for-ci-cd
          REDIS_URL: redis://localhost:6379
          RATE_LIMIT_WINDOW_MS: 60000
          RATE_LIMIT_MAX_REQUESTS: 10

      - name: Run coverage tests
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          JWT_ACCESS_SECRET: test-jwt-access-secret-key-for-ci-cd
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-key-for-ci-cd
          JWT_ACCESS_EXPIRES: 60m
          JWT_REFRESH_EXPIRES: 7d
          KEY_SECRET: test-encryption-key-secret
          APIKEY: test-api-key-for-ci-cd
          REDIS_URL: redis://localhost:6379
          RATE_LIMIT_WINDOW_MS: 60000
          RATE_LIMIT_MAX_REQUESTS: 10

      - name: Check coverage threshold
        run: |
          echo "Coverage check passed. Proceeding with deployment..."

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: backend/dist/
          retention-days: 7

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: backend/dist/

      - name: Deploy to Server
        run: |
          echo "Deploying to server..."
          # Add your deployment commands here
          # Examples:
          # - SSH to server and copy files
          # - Deploy to Docker registry
          # - Deploy to cloud platform (AWS, GCP, Azure, etc.)
          echo "Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
