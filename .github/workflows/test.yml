name: Backend Tests

on:
  push:
    branches: [main, develop, staging]
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, develop, staging]
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  workflow_dispatch: # Allows manual trigger

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=./src/prisma/schema.prisma

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=./src/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          JWT_ACCESS_SECRET: test-jwt-access-secret-key-for-ci-cd
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-key-for-ci-cd
          JWT_ACCESS_EXPIRES: 60m
          JWT_REFRESH_EXPIRES: 7d
          KEY_SECRET: test-encryption-key-secret
          APIKEY: test-api-key-for-ci-cd
          REDIS_URL: redis://localhost:6379
          RATE_LIMIT_WINDOW_MS: 60000
          RATE_LIMIT_MAX_REQUESTS: 10

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
          JWT_ACCESS_SECRET: test-jwt-access-secret-key-for-ci-cd
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-key-for-ci-cd
          JWT_ACCESS_EXPIRES: 60m
          JWT_REFRESH_EXPIRES: 7d
          KEY_SECRET: test-encryption-key-secret
          APIKEY: test-api-key-for-ci-cd
          REDIS_URL: redis://localhost:6379
          RATE_LIMIT_WINDOW_MS: 60000
          RATE_LIMIT_MAX_REQUESTS: 10

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: backend/coverage/
          retention-days: 30

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript types
        run: npx tsc --noEmit

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: always()

    steps:
      - name: Check test status
        run: |
          if [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "Tests or lint failed!"
            exit 1
          fi
          echo "All checks passed!"
